function won(w){if(w>=1e8)return(w/1e8).toFixed(2)+"억";if(w>=1e4)return Math.round(w/1e4).toLocaleString()+"만";return Math.round(w).toLocaleString();}

function toDay(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

function load(){try{var r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch(e){return null;}}
function persist(s){try{localStorage.setItem(SK,JSON.stringify(s));return true;}catch(e){return false;}}

function derive(s){
  var logBuyShares=s.logs.reduce((a,l)=>a+(l.bought?(l.shares||0):0),0);
  var totShares=(s.initShares||0)+logBuyShares;
  var logBuyAmt=s.logs.reduce((a,l)=>a+(l.bought?(l.buyAmt||0):0),0);
  var invested=(s.initCapital||0)+logBuyAmt;
  var sorted=s.logs.slice().sort((a,b)=>b.date.localeCompare(a.date));
  var last=sorted[0];
  var price=last?last.price:0, fx=last?last.fx:1300, ndx=last?last.ndx:0;
  var krw=totShares*price*fx, bil=krw/1e8, profit=krw-invested, roi=invested>0?(krw/invested-1)*100:0;
  return {logBuyShares,totShares,invested,last,price,fx,ndx,krw,bil,profit,roi};
}

// ── Finnhub (무료키, CORS 열림, 프록시 불필요)
async function fetchFinnhub(key){
  var out={};
  try{
    var r=await fetch("https://finnhub.io/api/v1/quote?symbol=TQQQ&token="+key);
    var d=await r.json();
    if(d.c>0)out.price=d.c; // current price
  }catch(e){}
  // 환율 (Finnhub forex)
  try{
    var r2=await fetch("https://finnhub.io/api/v1/quote?symbol=OANDA:USD_KRW&token="+key);
    var d2=await r2.json();
    if(d2.c>0)out.fx=d2.c;
  }catch(e){}
  return out;
}

// ── Stooq (여러 프록시 시도, 키 불필요)
var PROXIES=[
  function(u){return "https://api.allorigins.win/raw?url="+encodeURIComponent(u);},
  function(u){return "https://corsproxy.io/?url="+encodeURIComponent(u);},
  function(u){return "https://thingproxy.freeboard.io/fetch/"+u;},
];
async function fetchOne(sym){
  var url="https://stooq.com/q/l/?s="+sym+"&f=sd2t2ohlcv&h&e=csv";
  for(var i=0;i<PROXIES.length;i++){
    try{
      var r=await fetch(PROXIES[i](url));
      if(!r.ok)continue;
      var t=await r.text();
      var rows=t.trim().split("\n");
      if(rows[1]){
        var c=rows[1].split(",");
        var close=parseFloat(c[6]);
        if(close>0&&!isNaN(close))return close;
      }
    }catch(e){}
  }
  return 0;
}
async function fetchStooq(){
  var out={};
  var price=await fetchOne("tqqq.us");
  if(price>0)out.price=price;
  var ndx=await fetchOne("^ndx");
  if(ndx>0)out.ndx=ndx;
  var fx=await fetchOne("usdkrw");
  if(fx>0)out.fx=fx;
  return out;
}

// ── 통합 무료 조회: Finnhub(키있으면) + Stooq로 NDX 보완
async function fetchFree(finnKey){
  var out={};
  if(finnKey){
    var f=await fetchFinnhub(finnKey);
    if(f.price>0)out.price=f.price;
    if(f.fx>0)out.fx=f.fx;
  }
  // NDX는 항상 Stooq, 그리고 빠진 값 보완
  var needNdx=true, needPrice=!out.price, needFx=!out.fx;
  var ndx=await fetchOne("^ndx");
  if(ndx>0)out.ndx=ndx;
  if(needPrice){var p=await fetchOne("tqqq.us");if(p>0)out.price=p;}
  if(needFx){var x=await fetchOne("usdkrw");if(x>0)out.fx=x;}
  return out;
}

// ── Anthropic API (키 있을 때, 시세+고점+뉴스)
async function fetchAnthropic(key,wantNews){
  var content = wantNews
    ? "오늘 미국 증시를 검색해서: (1)TQQQ 현재가 USD (2)NASDAQ-100 NDX 현재값 (3)NDX 역대최고치 (4)USD/KRW 환율 (5)오늘 핵심뉴스 3개(시황/빅테크/거시 섞어서 각 한문장). JSON만 출력: {\"price\":num,\"ndx\":num,\"ndxPeak\":num,\"fx\":num,\"news\":[{\"cat\":\"시황|빅테크|거시\",\"text\":\"...\"}]}"
    : "검색해서: (1)TQQQ 현재가 USD (2)NASDAQ-100 NDX 현재값 (3)NDX 역대최고치 (4)USD/KRW 환율. JSON만: {\"price\":num,\"ndx\":num,\"ndxPeak\":num,\"fx\":num}";
  var res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-3-5-sonnet-20241022",max_tokens:700,tools:[{type:"web_search_20250305",name:"web_search"}],messages:[{role:"user",content:content}]})
  });
  var d=await res.json();
  if(d.error)throw new Error(d.error.message||"API 오류");
  var txt="";var blocks=d.content||[];
  for(var i=0;i<blocks.length;i++){if(blocks[i].type==="text")txt+=blocks[i].text;}
  var m=txt.match(/\{[\s\S]*\}/);
  if(!m)throw new Error("응답 파싱 실패");
  return JSON.parse(m[0]);
}

// ═══════ 홈 ═══════
function HomeTab(p){
  var s=p.s,onSave=p.onSave,onToast=p.onToast,apiKey=p.apiKey,finnKey=p.finnKey;
  var [price,setPrice]=useState("");
  var [ndx,setNdx]=useState("");
  var [fx,setFx]=useState("1300");
  var [msg,setMsg]=useState("");
  var [busy,setBusy]=useState(false);
  var [newsBusy,setNewsBusy]=useState(false);

  var td=toDay();
  var todayLog=s.logs.find(l=>l.date===td);
  var D=derive(s);
  var dday=Math.floor((new Date()-new Date(s.startDate))/86400000);
  var boughtDays=s.logs.filter(l=>l.bought).length;
  var streak=(()=>{var so=s.logs.slice().sort((a,b)=>b.date.localeCompare(a.date));var n=0;for(var i=0;i<so.length;i++){if(so[i].bought)n++;else break;}return n;})();
  var peak=s.ndxPeak||0;
  var curNdx=todayLog?todayLog.ndx:D.ndx;
  var mddPct=peak>0&&curNdx>0?(curNdx-peak)/peak*100:0;
  var mddAbs=Math.abs(mddPct);
  var daily=s.daily||50000;
  var extra=0;
  if(mddPct<=-50)extra=200000;else if(mddPct<=-40)extra=150000;else if(mddPct<=-30)extra=100000;else if(mddPct<=-20)extra=50000;
  var buyAmt=daily+extra;
  var swRow=getSW(D.bil);
  var nextBil=Math.floor(D.bil)+1;
  var remain=(nextBil-D.bil)*1e8;
  var useP=todayLog?todayLog.price:parseFloat(price);
  var useF=todayLog?todayLog.fx:(parseFloat(fx)||1300);
  var buyShares=(useP>0&&useF>0)?buyAmt/(useP*useF):0;
  var quote=todayQuote();

  async function fetchPrice(){
    setBusy(true);setMsg(apiKey?"AI 시세 조회 중...":(finnKey?"Finnhub 시세 조회 중...":"무료 시세 조회 중..."));
    try{
      var data;
      if(apiKey){
        data=await fetchAnthropic(apiKey,false);
      }else{
        data=await fetchFree(finnKey);
        if(!data.price&&!data.ndx&&!data.fx)throw new Error("시세 서버 응답 없음 - 잠시 후 재시도하거나 직접 입력");
      }
      if(data.price>0)setPrice(String(Number(data.price).toFixed(2)));
      if(data.ndx>0)setNdx(String(Math.round(data.ndx)));
      if(data.fx>0)setFx(String(Math.round(data.fx)));
      if(data.ndxPeak>0&&data.ndxPeak>(s.ndxPeak||0)){
        await onSave(Object.assign({},s,{ndxPeak:Math.round(data.ndxPeak)}));
        setMsg("✓ 완료 · NDX고점 "+Math.round(data.ndxPeak).toLocaleString());
      }else{
        var got=[];
        if(data.price>0)got.push("TQQQ");
        if(data.ndx>0)got.push("NDX");
        if(data.fx>0)got.push("환율");
        setMsg("✓ 조회: "+got.join("/")+(apiKey?"":" (고점은 자동/수동)"));
      }
    }catch(e){setMsg(e.message);}
    setBusy(false);
  }

  async function fetchNews(){
    if(!apiKey){onToast("뉴스는 API키가 필요해요");return;}
    setNewsBusy(true);
    try{
      var data=await fetchAnthropic(apiKey,true);
      if(data.price>0)setPrice(String(Number(data.price).toFixed(2)));
      if(data.ndx>0)setNdx(String(Math.round(data.ndx)));
      if(data.fx>0)setFx(String(Math.round(data.fx)));
      var patch={news:data.news||null,newsDate:td};
      if(data.ndxPeak>0&&data.ndxPeak>(s.ndxPeak||0))patch.ndxPeak=Math.round(data.ndxPeak);
      await onSave(Object.assign({},s,patch));
    }catch(e){onToast(e.message);}
    setNewsBusy(false);
  }

  async function saveClose(){
    var p2=parseFloat(price),n2=parseFloat(ndx),f2=parseFloat(fx)||1300;
    if(!p2||!n2){onToast("종가와 NDX를 입력해주세요");return;}
    var ns=Object.assign({},s,{logs:s.logs.slice()});
    if(n2>(ns.ndxPeak||0))ns.ndxPeak=n2;
    var idx=ns.logs.findIndex(l=>l.date===td);
    if(idx>=0)ns.logs[idx]=Object.assign({},ns.logs[idx],{price:p2,ndx:n2,fx:f2});
    else ns.logs.push({date:td,price:p2,ndx:n2,fx:f2,shares:0,buyAmt:0,extra:0,bought:false,swFired:null});
    await onSave(ns);onToast("종가 저장됨");
  }
  async function doBuy(){
    if(!todayLog){onToast("먼저 종가를 저장해주세요");return;}
    if(todayLog.bought){onToast("이미 매수 완료");return;}
    var p2=todayLog.price,n2=todayLog.ndx,f2=todayLog.fx;
    var ns=Object.assign({},s,{logs:s.logs.slice(),triggered:(s.triggered||[]).slice()});
    var peak2=ns.ndxPeak||n2;var mdd2=(n2-peak2)/peak2*100;var ex2=0;
    if(mdd2<=-50)ex2=200000;else if(mdd2<=-40)ex2=150000;else if(mdd2<=-30)ex2=100000;else if(mdd2<=-20)ex2=50000;
    var ba2=daily+ex2;var sh2=ba2/(p2*f2);
    var D2=derive(s);var newBil=(D2.totShares+sh2)*p2*f2/1e8;var swFired=null;
    for(var t=1;t<=Math.floor(newBil);t++){if(ns.triggered.indexOf(t)===-1){ns.triggered.push(t);swFired=t;}}
    var idx=ns.logs.findIndex(l=>l.date===td);
    ns.logs[idx]=Object.assign({},ns.logs[idx],{shares:sh2,buyAmt:ba2,extra:ex2,bought:true,swFired:swFired});
    await onSave(ns);onToast("매수 완료 · +"+sh2.toFixed(4)+"주");
  }
  async function cancelBuy(){
    if(!todayLog||!todayLog.bought)return;
    var ns=Object.assign({},s,{logs:s.logs.map(l=>l.date===td?Object.assign({},l,{shares:0,buyAmt:0,extra:0,bought:false,swFired:null}):l)});
    await onSave(ns);onToast("매수 취소됨");
  }

  var news=s.news&&s.newsDate===td?s.news:null;
  var catColor={"시황":C.green,"빅테크":C.blue,"거시":C.gold};

  return (
    <div style={{padding:"8px 16px 100px",maxWidth:500,margin:"0 auto"}}>
      <div style={{padding:"18px 4px 10px"}}>
        <div style={{fontSize:17,fontWeight:600,color:C.t,lineHeight:1.5}}>"{quote.t}"</div>
        <div style={{fontSize:13,color:C.t3,marginTop:8}}>— {quote.a}</div>
      </div>

      <div style={{background:"linear-gradient(160deg,"+C.card3+" 0%,"+C.card+" 60%)",borderRadius:26,padding:"26px 22px",marginBottom:14,position:"relative",overflow:"hidden",boxShadow:"0 4px 24px rgba(0,0,0,.35)"}}>
        <div style={{position:"absolute",top:-40,right:-40,width:160,height:160,borderRadius:"50%",background:"radial-gradient(circle,"+C.green+"22,transparent 70%)"}}/>
        <div style={{fontSize:13,color:C.t2,marginBottom:8,fontWeight:500,position:"relative"}}>총 자산 평가액</div>
        <div style={{display:"flex",alignItems:"baseline",gap:6,position:"relative"}}>
          <div style={{fontFamily:"monospace",fontSize:42,fontWeight:800,color:C.t,lineHeight:1}}>{won(D.krw)}</div>
          <div style={{fontSize:20,color:C.t2,fontWeight:600}}>원</div>
        </div>
        <div style={{display:"flex",gap:8,marginTop:14,position:"relative"}}>
          <div style={{background:D.profit>=0?"rgba(62,230,160,.15)":"rgba(255,94,108,.15)",color:D.profit>=0?C.green:C.coral,padding:"6px 12px",borderRadius:10,fontSize:14,fontWeight:700,fontFamily:"monospace"}}>
            {D.profit>=0?"▲":"▼"} {won(Math.abs(D.profit))}원 ({D.roi>=0?"+":""}{D.roi.toFixed(1)}%)
          </div>

function LogTab(p){

  var rows=s.logs.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(l=>{if(l.bought)cum+=(l.shares||0);return Object.assign({},l,{cum:cum});}).reverse();

    <div style={{padding:"8px 16px 100px",maxWidth:500,margin:"0 auto"}}>

  );
}

function CfgTab(p){
  var s=p.s,onSave=p.onSave,onToast=p.onToast,onReset=p.onReset,apiKey=p.apiKey,setApiKey=p.setApiKey,finnKey=p.finnKey,setFinnKey=p.setFinnKey;
  var D=derive(s);
  var [daily,setDaily]=useState(String(s.daily||50000));
  var [initShares,setInitShares]=useState(String(s.initShares||0));
  var [initCapital,setInitCapital]=useState(String(s.initCapital||0));
  var [triggered,setTriggered]=useState((s.triggered||[]).join(","));
  var [keyInput,setKeyInput]=useState(apiKey);
  var [finnInput,setFinnInput]=useState(finnKey);
  useEffect(function(){
    setDaily(String(s.daily||50000));setInitShares(String(s.initShares||0));
    setInitCapital(String(s.initCapital||0));setTriggered((s.triggered||[]).join(","));
  },[s.daily,s.initShares,s.initCapital,s.triggered]);

  async function doSave(){
    await onSave(Object.assign({},s,{daily:parseInt(daily)||50000,initShares:parseFloat(initShares)||0,initCapital:parseFloat(initCapital)||0,triggered:triggered?triggered.split(",").map(x=>parseInt(x.trim())).filter(n=>!isNaN(n)):[]}));
    onToast("설정이 저장됐어요");
  }
  function doSaveKey(){setApiKey(keyInput);saveKey(keyInput);onToast(keyInput?"Anthropic 키 저장됨":"Anthropic 키 삭제됨");}
  function doSaveFinn(){setFinnKey(finnInput);saveFinn(finnInput);onToast(finnInput?"Finnhub 키 저장됨":"Finnhub 키 삭제됨");}

  return (
    <div style={{padding:"8px 16px 100px",maxWidth:500,margin:"0 auto"}}>
      <div style={{padding:"18px 4px 14px"}}><div style={{fontSize:24,fontWeight:800,color:C.t}}>설정</div></div>

      <Card>
        <Label>📈 Finnhub 시세 키 (무료 추천)</Label>
        <div style={{fontSize:12,color:C.t3,lineHeight:1.7,marginBottom:14}}>
          finnhub.io에서 <b style={{color:C.t2}}>이메일만으로 무료</b> 발급(결제X).<br/>
          넣으면 TQQQ·환율 실시간 조회가 안정적이에요.<br/>
          NDX 지수는 자동으로 보완 조회됩니다.
        </div>
        <div style={{marginBottom:12}}>
          <TInput label="Finnhub API Key" type="password" value={finnInput} onChange={e=>setFinnInput(e.target.value)} placeholder="키 붙여넣기"/>
        </div>
        <Btn label={finnKey?"Finnhub 키 업데이트":"Finnhub 키 저장"} bg={C.card3} fg={C.green} onClick={doSaveFinn} small/>
        <div style={{fontSize:12,color:finnKey?C.green:C.t3,marginTop:10,fontFamily:"monospace",textAlign:"center"}}>{finnKey?"✓ Finnhub 설정됨":"미설정 (Stooq 폴백 사용)"}</div>
      </Card>

      <Card>
        <Label>🔑 Anthropic API 키 (선택, 유료)</Label>
        <div style={{fontSize:12,color:C.t3,lineHeight:1.7,marginBottom:14}}>
          넣으면 AI가 시세+NDX고점+<b style={{color:C.t2}}>뉴스</b>까지 자동 조회해요.<br/>
          유료(사용량 과금). 뉴스가 필요할 때만 권장.<br/>
          <span style={{color:C.t2}}>키는 이 기기에만 저장돼요.</span>
        </div>
        <div style={{marginBottom:12}}>
          <TInput label="sk-ant-..." type="password" value={keyInput} onChange={e=>setKeyInput(e.target.value)} placeholder="API 키 붙여넣기"/>
        </div>
        <Btn label={apiKey?"Anthropic 키 업데이트":"Anthropic 키 저장"} bg={C.card3} fg={C.blue} onClick={doSaveKey} small/>
        <div style={{fontSize:12,color:apiKey?C.green:C.t3,marginTop:10,fontFamily:"monospace",textAlign:"center"}}>{apiKey?"✓ Anthropic 설정됨 (뉴스 가능)":"미설정"}</div>
      </Card>

      <Card>
        <div style={{background:"rgba(62,230,160,.06)",borderRadius:14,padding:"14px 16px",marginBottom:18,fontSize:12,color:C.t2,lineHeight:1.8}}>
          <b style={{color:C.green}}>초기 보유수량</b> · 앱 사용 전 가진 주식 수<br/>
          <b style={{color:C.green}}>초기 투입원금</b> · 지금까지 넣은 총 금액(원)<br/>
          <b style={{color:C.green}}>NDX 고점</b> · 현재 {s.ndxPeak?s.ndxPeak.toLocaleString()+"pt":"미설정"}
        </div>
        <div style={{marginBottom:14}}><TInput label="일일 매수금액 (원)" value={daily} onChange={e=>setDaily(e.target.value)} placeholder="50000"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <TInput label="초기 보유수량 (주)" value={initShares} onChange={e=>setInitShares(e.target.value)} placeholder="382.5"/>
          <TInput label="초기 투입원금 (원)" value={initCapital} onChange={e=>setInitCapital(e.target.value)} placeholder="5300000"/>
        </div>
        <div style={{marginBottom:16}}><TInput label="발동된 스위칭 (쉼표, 예: 1,2)" value={triggered} onChange={e=>setTriggered(e.target.value)} placeholder="없으면 공백"/></div>
        <div style={{background:C.card2,borderRadius:16,padding:16,marginBottom:16,fontFamily:"monospace",fontSize:13,color:C.t2,lineHeight:1.9}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span>총 보유</span><span style={{color:C.green}}>{D.totShares.toFixed(3)}주</span></div>
          <div style={{display:"flex",justifyContent:"space-between"}}><span>총 투입원금</span><span style={{color:C.green}}>{won(D.invested)}원</span></div>
          <div style={{display:"flex",justifyContent:"space-between"}}><span>평가액</span><span style={{color:C.green}}>{won(D.krw)}원</span></div>
        </div>
        <Btn label="설정 저장" bg={C.blue} fg="#fff" onClick={doSave}/>
      </Card>

      <Card>
        <Label mb={12}>데이터 관리</Label>
        <div style={{background:C.card2,borderRadius:14,padding:"12px 16px",marginBottom:14,fontSize:12,color:C.t2,fontFamily:"monospace",lineHeight:1.7}}>
          마지막 저장: <span style={{color:s.lastSaved?C.green:C.coral}}>{s.lastSaved?new Date(s.lastSaved).toLocaleString("ko-KR"):"없음"}</span><br/>
          기록 수: <span style={{color:C.t}}>{s.logs.length}건</span><br/>
          저장 방식: <span style={{color:C.green}}>localStorage (영구)</span>
        </div>
        <Btn label="전체 초기화" bg={C.card3} fg={C.coral} onClick={onReset} small/>
      </Card>
    </div>
  );
}

// ═══════ 온보딩 ═══════
function Onboard(p){
  var [daily,setDaily]=useState("50000");
  var [initShares,setInitShares]=useState("");
  var [initCapital,setInitCapital]=useState("");
  function done(){p.onDone({startDate:"2026-03-12",daily:parseInt(daily)||50000,initShares:parseFloat(initShares)||0,initCapital:parseFloat(initCapital)||0});}
  return (
    <div style={{position:"fixed",inset:0,background:C.bg,zIndex:200,overflowY:"auto",padding:24}}>
      <div style={{maxWidth:440,margin:"40px auto"}}>
        <div style={{fontFamily:"monospace",fontSize:13,color:C.green,fontWeight:700,letterSpacing:2,marginBottom:12}}>TQQQ TRACKER</div>
        <div style={{fontSize:28,fontWeight:800,color:C.t,lineHeight:1.3,marginBottom:12}}>21년의 여정을<br/>함께 시작해요</div>
        <div style={{fontSize:14,color:C.t3,lineHeight:1.7,marginBottom:28}}>이미 투자 중이라면 현황을 입력해주세요. NDX 고점은 첫 시세 조회 때 자동 설정됩니다.</div>
        <div style={{marginBottom:16}}><TInput label="일일 매수금액 (원)" value={daily} onChange={e=>setDaily(e.target.value)} placeholder="50000"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:28}}>
          <TInput label="현재 보유수량 (주)" value={initShares} onChange={e=>setInitShares(e.target.value)} placeholder="382.5"/>
          <TInput label="투입원금 (원)" value={initCapital} onChange={e=>setInitCapital(e.target.value)} placeholder="5300000"/>
        </div>
        <Btn label="시작하기" bg={C.green} fg="#0b0e14" onClick={done}/>
      </div>
    </div>
  );
}

// ═══════ App ═══════
function App(){
  var [s,setS]=useState(null);
  var [tab,setTab]=useState("home");
  var [toast,setToast]=useState("");
  var [ready,setReady]=useState(false);
  var [apiKey,setApiKey]=useState("");
  var [finnKey,setFinnKey]=useState("");

  useEffect(function(){
    var d=load();setS(d||Object.assign({},BLANK));
    setApiKey(loadKey());setFinnKey(loadFinn());setReady(true);
  },[]);

  async function onSave(ns){
    var withTime=Object.assign({},ns,{lastSaved:new Date().toISOString()});
    setS(withTime);
    var ok=persist(withTime);
    if(!ok)onToast("⚠️ 저장 실패 - 저장공간 확인");
  }
  function onToast(m){setToast(m);setTimeout(()=>setToast(""),2000);}
  function onReset(){try{localStorage.removeItem(SK);}catch(e){}setS(Object.assign({},BLANK));}

  if(!ready)return <div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.t3,fontFamily:"monospace"}}>로딩중…</div>;
  if(!s.done)return <Onboard onDone={d=>{onSave(Object.assign({},BLANK,d,{done:true,logs:[]}));}}/>;

  var TABS=[["home","홈"],["log","기록"],["goal","목표"],["cfg","설정"]];
  var ICONS={home:"M3 10.5L12 3l9 7.5M5 9.5V20h14V9.5",log:"M4 6h16M4 12h16M4 18h10",goal:"M12 2a10 10 0 100 20 10 10 0 000-20zm0 5v5l3 3",cfg:"M12 8a4 4 0 100 8 4 4 0 000-8zm8 4l2-1-2-4-2 1a7 7 0 00-2-1V4h-4v2a7 7 0 00-2 1L8 6 6 10l2 1v2l-2 1 2 4 2-1a7 7 0 002 1v2h4v-2a7 7 0 002-1l2 1 2-4-2-1z"};

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.t,fontSize:14}}>
      {toast?<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:C.t,color:C.bg,fontWeight:700,fontSize:14,padding:"12px 22px",borderRadius:24,zIndex:999,whiteSpace:"nowrap",pointerEvents:"none",boxShadow:"0 8px 28px rgba(0,0,0,.5)"}}>{toast}</div>:null}
      <div style={{display:tab==="home"?"block":"none"}}><HomeTab s={s} onSave={onSave} onToast={onToast} apiKey={apiKey} finnKey={finnKey}/></div>
      <div style={{display:tab==="log"?"block":"none"}}><LogTab s={s}/></div>
      <div style={{display:tab==="goal"?"block":"none"}}><GoalTab s={s}/></div>
      <div style={{display:tab==="cfg"?"block":"none"}}><CfgTab s={s} onSave={onSave} onToast={onToast} onReset={onReset} apiKey={apiKey} setApiKey={setApiKey} finnKey={finnKey} setFinnKey={setFinnKey}/></div>
      <div style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(11,14,20,.92)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderTop:"1px solid "+C.line,display:"grid",gridTemplateColumns:"repeat(4,1fr)",padding:"10px 0 calc(10px + env(safe-area-inset-bottom))",zIndex:100}}>
        {TABS.map(it=>{
          var on=tab===it[0];
          return(<div key={it[0]} onClick={()=>setTab(it[0])} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,cursor:"pointer"}}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={on?C.green:C.t3} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d={ICONS[it[0]]}/></svg>
            <div style={{fontSize:11,color:on?C.green:C.t3,fontWeight:on?700:500}}>{it[1]}</div>
          </div>);
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
